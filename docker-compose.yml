version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: loginapp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loginapp
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db_setup.sql:/docker-entrypoint-initdb.d/01-db_setup.sql
      - ./backend/leave_setup.sql:/docker-entrypoint-initdb.d/02-leave_setup.sql
      - ./backend/assets_setup.sql:/docker-entrypoint-initdb.d/03-assets_setup.sql
      - ./backend/sql/production_optimization.sql:/docker-entrypoint-initdb.d/04-production_optimization.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loginapp-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: loginapp
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/loginapp
      JWT_SECRET: docker_jwt_secret_change_in_production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: loginapp-frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
  logs_data:
