services:
  - type: web
    name: employee-management-api
    env: node
    region: oregon
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: FRONTEND_URL
        sync: false
      - key: LOG_LEVEL
        value: warn
      - key: CACHE_TTL
        value: 600
      - key: DEFAULT_PAGE_LIMIT
        value: 20
      - key: MAX_FILE_SIZE
        value: 5242880
